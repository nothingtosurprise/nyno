- step: ai-mistral-text
  args:
    - ${FILES_ONLY_PROMPT} ${prev}
  context:
    MISTRAL_API_KEY: "your Mistral api key"
    FILES_ONLY_PROMPT: |
      Return ONLY a JavaScript object, don't include any comments and never ever surround the output in markdown like ```json or ```javascript:

      {
        "relative/file.ext": "full file content"
      }

      Rules:
      - keys = relative paths
      - values = complete file contents
      - no explanations

      Task:
    MISTRAL_JSON_MODE: true
